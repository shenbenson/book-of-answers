  <title>答案之书 / Book of Answers</title>

  <meta name="description" content="答案之书，提供简体中文、繁体中文和英文三种语言的随机智慧答案。揭示生活、工作、感情等问题的最佳建议。The Book of Answers offers random wise answers in Simplified Chinese, Traditional Chinese, and English, revealing the best advice for questions about life, work, relationships, and more." />
  <meta name="keywords" content="答案, 随机答案, Book of Answers, 智慧答案, 在线占卜, 中文答案, 英文答案" />
  <meta name="author" content="shenbenson" />

  <meta property="og:title" content="答案之书 - Book of Answers" />
  <meta property="og:description" content="提供三种语言的随机智慧答案，帮助你揭示生活中的疑问。Provides random wise answers to help you uncover life's questions." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://boa.bensonshen.com/" />
  <meta property="og:image" content="https://boa.bensonshen.com/assets/img/preview.png" />

  <meta name="theme-color" content="#080612" />
  <link rel="icon" href="assets/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Noto+Serif+SC:wght@300;400&display=swap" />
  <link rel="stylesheet" href="assets/css/style.css?v=20260622" />
  <link rel="preload" href="assets/js/script.js?v=20260622" as="script" />
</head>

<body>
  <div class="orb orb-a" aria-hidden="true"></div>
  <div class="orb orb-b" aria-hidden="true"></div>
  <div class="orb orb-c" aria-hidden="true"></div>

  <div class="topbar">
    <div class="lang-switch" role="group" aria-label="Select language">
      <button type="button" class="lang-btn" id="langBtn-zh" data-lang="zh">简</button>
      <button type="button" class="lang-btn" id="langBtn-zh-TW" data-lang="zh-TW">繁</button>
      <button type="button" class="lang-btn" id="langBtn-en" data-lang="en">EN</button>
    </div>

    <button type="button" class="mute-btn" id="muteButton" aria-label="Toggle sound" aria-pressed="false">
      <svg class="icon-sound" width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M2 5.5H4.8L8.5 2.5V12.5L4.8 9.5H2V5.5Z" stroke="currentColor" stroke-width="1.15" stroke-linejoin="round"/><path d="M10.5 5C11.5 5.9 12 6.7 12 7.5C12 8.3 11.5 9.1 10.5 10" stroke="currentColor" stroke-width="1.15" stroke-linecap="round"/></svg>
      <svg class="icon-muted hidden" width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M2 5.5H4.8L8.5 2.5V12.5L4.8 9.5H2V5.5Z" stroke="currentColor" stroke-width="1.15" stroke-linejoin="round"/><line x1="10.5" y1="5" x2="13.5" y2="10" stroke="currentColor" stroke-width="1.15" stroke-linecap="round"/><line x1="13.5" y1="5" x2="10.5" y2="10" stroke="currentColor" stroke-width="1.15" stroke-linecap="round"/></svg>
    </button>
  </div>

  <main class="container" role="main">
    <div class="title-group">
      <p class="title-oracle" id="titleOracle">— Guidance —</p>
      <h1 id="titleMain">Book of Answers</h1>
      <p class="title-sub" id="titleSub">答案之书</p>
    </div>

    <div class="divider" aria-hidden="true">
      <span class="divider-line divider-line-left"></span>
      <span class="divider-mark">✦</span>
      <span class="divider-line divider-line-right"></span>
    </div>

    <div class="book-frame hidden" id="bookFrame" role="region" aria-live="polite" aria-label="Answer card">
      <span class="corner corner-tl" aria-hidden="true"></span>
      <span class="corner corner-tr" aria-hidden="true"></span>
      <span class="corner corner-bl" aria-hidden="true"></span>
      <span class="corner corner-br" aria-hidden="true"></span>

      <div class="book-prompt" id="bookPrompt"></div>

      <div class="book-answer hidden" id="bookAnswer" aria-hidden="true">
        <p class="answer-text" id="answerText"></p>
        <p class="answer-date" id="answerDate"></p>
      </div>
    </div>

    <div class="lang-prompt hidden" id="langPrompt" role="region" aria-label="Select language">
      <span class="corner corner-tl" aria-hidden="true"></span>
      <span class="corner corner-tr" aria-hidden="true"></span>
      <span class="corner corner-bl" aria-hidden="true"></span>
      <span class="corner corner-br" aria-hidden="true"></span>

      <p class="lang-prompt-title">选择语言 / Select Language</p>
      <div class="lang-prompt-options">
        <button type="button" class="lang-prompt-btn" data-lang="zh">简体中文</button>
        <button type="button" class="lang-prompt-btn" data-lang="zh-TW">繁體中文</button>
        <button type="button" class="lang-prompt-btn" data-lang="en">English</button>
      </div>
    </div>

    <button type="button" class="open-btn hidden" id="openButton"></button>

    <div class="share-wrap">
      <button type="button" class="share-btn hidden" id="shareButton"></button>
    </div>
  </main>

  <footer>
    <p>&copy; <span id="year"></span> 答案之书 / Book of Answers by <a href="https://yumolab.com" target="_blank" rel="noopener">YUMOLAB</a></p>
  </footer>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="assets/js/script.js?v=20260622" defer></script>

</body>
</html>
